name: Update Shelter Badge
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      resync:
        description: "Clear cached data and re-backfill (use after changing area in config.toml)"
        type: boolean
        default: false
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Clear cache for resync
        if: ${{ github.event.inputs.resync == 'true' }}
        run: |
          printf 'time,city,id,category,title\n' > data/tzevaadom_alerts.csv
          printf 'time,city,id,category,title\n' > data/tzevaadom_messages.csv
      - run: python -m am_israel_hai_badge.main
        env:
          BADGE_AREAS: ${{ vars.BADGE_AREAS }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONPATH: src
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/ data/
          git diff --staged --quiet || git commit -m "Update shelter badge"
          git push
